# ============================================
# GRAFIDE — Production Configuration
# All secrets read from environment variables.
# Never commit real values to source control.
# ============================================

server.port=${PORT:8080}

# ---- MongoDB Atlas ----
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:grafide}

# ---- JWT ----
grafide.jwt.secret=${3lVkAnw7lho06+ZzS39uGpBqss/wrB2BOsMZRAKLNV+/EhKZ8yggDcK82wLtgh+DOxRt0DMFI1uHzCUke/tYSw==}
grafide.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- SendGrid ----
grafide.sendgrid.api-key=${SENDGRID_API_KEY}
grafide.sendgrid.from-email=${SENDGRID_FROM_EMAIL:noreply@grafide.com}
grafide.sendgrid.from-name=${SENDGRID_FROM_NAME:Grafide}

# ---- CORS ----
# Comma-separated list of allowed frontend origins
grafide.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500}

# ---- Logging (quieter in prod) ----
logging.level.com.grafide=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework=WARN

# ---- Jackson ----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null