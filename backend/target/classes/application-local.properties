# ============================================
# GRAFIDE — Local Development Configuration
# This file is for local use only.
# It is listed in .gitignore and never deployed.
# ============================================

server.port=8080

# ---- MongoDB (local) ----
spring.data.mongodb.uri=mongodb://localhost:27017/grafide
spring.data.mongodb.database=grafide

# ---- JWT ----
# Generate a new secret: openssl rand -base64 64
grafide.jwt.secret=your-very-long-and-random-secret-key-that-is-at-least-32-characters-long
grafide.jwt.expiration-ms=86400000

# ---- SendGrid ----
grafide.sendgrid.api-key=YOUR_SENDGRID_API_KEY_HERE
grafide.sendgrid.from-email=noreply@grafide.com
grafide.sendgrid.from-name=Grafide

# ---- CORS ----
grafide.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500

# ---- Logging ----
logging.level.com.grafide=DEBUG
logging.level.org.springframework.security=INFO
